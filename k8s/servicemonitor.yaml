apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: invoiceflow
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: invoiceflow
  namespaceSelector:
    matchNames:
      - invoiceflow
  endpoints:
    - port: http
      path: /health
      interval: 15s