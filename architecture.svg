<svg width="100%" viewBox="0 0 680 820" role="img" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:ui-sans-serif,system-ui,sans-serif">
  <title>InvoiceFlow system architecture</title>
  <desc>End-to-end diagram showing CI/CD pipeline, GitOps flow, Blue-Green deployment on GKE, and observability stack</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Section labels -->
  <text font-size="11" fill="#888" font-weight="500" x="40" y="28">CI pipeline</text>
  <text font-size="11" fill="#888" font-weight="500" x="40" y="310">GitOps</text>
  <text font-size="11" fill="#888" font-weight="500" x="40" y="490">GKE cluster (asia-south1)</text>
  <text font-size="11" fill="#888" font-weight="500" x="40" y="700">Observability</text>

  <!-- ── CI PIPELINE ── -->
  <!-- git push -->
  <rect x="40" y="38" width="88" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text font-size="13" font-weight="500" fill="#2C2C2A" x="84" y="61" text-anchor="middle">git push</text>
  <text font-size="11" fill="#5F5E5A" x="84" y="78" text-anchor="middle">main branch</text>

  <line x1="128" y1="64" x2="148" y2="64" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- GitHub Actions -->
  <rect x="148" y="38" width="96" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="13" font-weight="500" fill="#085041" x="196" y="61" text-anchor="middle">GitHub</text>
  <text font-size="11" fill="#0F6E56" x="196" y="78" text-anchor="middle">Actions</text>

  <line x1="244" y1="64" x2="264" y2="64" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- SonarQube -->
  <rect x="264" y="38" width="90" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-size="13" font-weight="500" fill="#3C3489" x="309" y="61" text-anchor="middle">SonarQube</text>
  <text font-size="11" fill="#534AB7" x="309" y="78" text-anchor="middle">quality gate</text>

  <line x1="354" y1="64" x2="374" y2="64" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Trivy -->
  <rect x="374" y="38" width="80" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-size="13" font-weight="500" fill="#712B13" x="414" y="61" text-anchor="middle">Trivy</text>
  <text font-size="11" fill="#993C1D" x="414" y="78" text-anchor="middle">CVE scan</text>

  <line x1="454" y1="64" x2="474" y2="64" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Docker Build -->
  <rect x="474" y="38" width="96" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="13" font-weight="500" fill="#085041" x="522" y="55" text-anchor="middle">Docker build</text>
  <text font-size="11" fill="#0F6E56" x="522" y="73" text-anchor="middle">→ Artifact Reg.</text>

  <line x1="522" y1="90" x2="522" y2="148" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text font-size="10" fill="#999" x="530" y="120">new tag</text>

  <!-- ── GITOPS ROW ── -->
  <!-- App Repo -->
  <rect x="40" y="148" width="110" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text font-size="13" font-weight="500" fill="#2C2C2A" x="95" y="168" text-anchor="middle" dominant-baseline="central">App Repo</text>
  <text font-size="11" fill="#5F5E5A" x="95" y="186" text-anchor="middle" dominant-baseline="central">src + Dockerfile</text>

  <path d="M95 148 L95 115 L148 115 L148 90" fill="none" stroke="#aaa" stroke-width="0.7" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- Argo CD -->
  <rect x="180" y="148" width="120" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-size="13" font-weight="500" fill="#0C447C" x="240" y="168" text-anchor="middle" dominant-baseline="central">Argo CD</text>
  <text font-size="11" fill="#185FA5" x="240" y="186" text-anchor="middle" dominant-baseline="central">GitOps controller</text>

  <line x1="400" y1="174" x2="300" y2="174" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text font-size="10" fill="#999" x="348" y="168" text-anchor="middle">watches</text>

  <!-- Config Repo -->
  <rect x="400" y="148" width="110" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-size="13" font-weight="500" fill="#0C447C" x="455" y="168" text-anchor="middle" dominant-baseline="central">Config Repo</text>
  <text font-size="11" fill="#185FA5" x="455" y="186" text-anchor="middle" dominant-baseline="central">K8s manifests</text>

  <line x1="240" y1="200" x2="240" y2="248" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text font-size="10" fill="#999" x="250" y="228">sync</text>

  <!-- ── GKE CLUSTER BOX ── -->
  <rect x="40" y="250" width="600" height="420" rx="16" fill="#E6F1FB" fill-opacity="0.10" stroke="#185FA5" stroke-width="0.8" stroke-dasharray="6 4" opacity="0.5"/>

  <!-- Ingress -->
  <rect x="280" y="270" width="120" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text font-size="13" font-weight="500" fill="#2C2C2A" x="340" y="296" text-anchor="middle" dominant-baseline="central">Ingress / LB</text>

  <line x1="340" y1="314" x2="340" y2="354" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- K8s Service -->
  <rect x="260" y="354" width="160" height="52" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text font-size="13" font-weight="500" fill="#633806" x="340" y="374" text-anchor="middle" dominant-baseline="central">K8s Service</text>
  <text font-size="11" fill="#854F0B" x="340" y="392" text-anchor="middle" dominant-baseline="central">selector switch</text>

  <!-- Blue pods -->
  <rect x="100" y="448" width="140" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-size="13" font-weight="500" fill="#0C447C" x="170" y="467" text-anchor="middle" dominant-baseline="central">Blue (prod)</text>
  <text font-size="11" fill="#185FA5" x="170" y="485" text-anchor="middle" dominant-baseline="central">FastAPI pods</text>

  <!-- Green pods -->
  <rect x="440" y="448" width="140" height="52" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text font-size="13" font-weight="500" fill="#173404" x="510" y="467" text-anchor="middle" dominant-baseline="central">Green (staging)</text>
  <text font-size="11" fill="#3B6D11" x="510" y="485" text-anchor="middle" dominant-baseline="central">FastAPI pods</text>

  <line x1="300" y1="406" x2="200" y2="448" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="380" y1="406" x2="480" y2="448" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)" opacity="0.55"/>
  <text font-size="10" fill="#999" x="450" y="432">on health check pass</text>

  <!-- Cloud Vision -->
  <rect x="80" y="540" width="130" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="13" font-weight="500" fill="#085041" x="145" y="559" text-anchor="middle" dominant-baseline="central">Cloud Vision</text>
  <text font-size="11" fill="#0F6E56" x="145" y="577" text-anchor="middle" dominant-baseline="central">OCR extraction</text>

  <!-- Firestore -->
  <rect x="275" y="540" width="130" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="13" font-weight="500" fill="#085041" x="340" y="559" text-anchor="middle" dominant-baseline="central">Firestore</text>
  <text font-size="11" fill="#0F6E56" x="340" y="577" text-anchor="middle" dominant-baseline="central">invoice store</text>

  <!-- HPA -->
  <rect x="470" y="540" width="130" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text font-size="13" font-weight="500" fill="#2C2C2A" x="535" y="559" text-anchor="middle" dominant-baseline="central">HPA</text>
  <text font-size="11" fill="#5F5E5A" x="535" y="577" text-anchor="middle" dominant-baseline="central">CPU / mem scale</text>

  <line x1="170" y1="500" x2="145" y2="540" stroke="#888" stroke-width="0.8" marker-end="url(#arrow)" opacity="0.6"/>
  <line x1="190" y1="500" x2="310" y2="540" stroke="#888" stroke-width="0.8" marker-end="url(#arrow)" opacity="0.6"/>
  <line x1="510" y1="500" x2="535" y2="540" stroke="#888" stroke-width="0.8" marker-end="url(#arrow)" opacity="0.6"/>

  <!-- Prometheus (inside GKE, bottom) -->
  <rect x="80" y="630" width="130" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-size="13" font-weight="500" fill="#712B13" x="145" y="648" text-anchor="middle" dominant-baseline="central">Prometheus</text>
  <text font-size="11" fill="#993C1D" x="145" y="666" text-anchor="middle" dominant-baseline="central">metrics + alerts</text>

  <path d="M170 500 L170 610 L145 630" fill="none" stroke="#aaa" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- ── OBSERVABILITY (outside GKE) ── -->
  <!-- Auto-rollback -->
  <rect x="80" y="718" width="130" height="52" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text font-size="13" font-weight="500" fill="#633806" x="145" y="737" text-anchor="middle" dominant-baseline="central">Auto-rollback</text>
  <text font-size="11" fill="#854F0B" x="145" y="755" text-anchor="middle" dominant-baseline="central">GH Actions webhook</text>

  <!-- Grafana -->
  <rect x="260" y="718" width="120" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-size="13" font-weight="500" fill="#712B13" x="320" y="737" text-anchor="middle" dominant-baseline="central">Grafana</text>
  <text font-size="11" fill="#993C1D" x="320" y="755" text-anchor="middle" dominant-baseline="central">dashboards</text>

  <!-- Keycloak -->
  <rect x="440" y="718" width="110" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-size="13" font-weight="500" fill="#3C3489" x="495" y="737" text-anchor="middle" dominant-baseline="central">Keycloak</text>
  <text font-size="11" fill="#534AB7" x="495" y="755" text-anchor="middle" dominant-baseline="central">SAML SSO</text>

  <!-- Prometheus → Rollback + Grafana -->
  <line x1="145" y1="682" x2="145" y2="718" stroke="#888" stroke-width="0.8" marker-end="url(#arrow)" opacity="0.55"/>
  <path d="M210 744 L260 744" fill="none" stroke="#888" stroke-width="0.8" marker-end="url(#arrow)" opacity="0.55"/>
  <text font-size="10" fill="#999" x="92" y="710">err &gt; 5%</text>

  <!-- Keycloak → Grafana -->
  <line x1="440" y1="744" x2="380" y2="744" stroke="#aaa" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)" opacity="0.6"/>

  <!-- Rollback → Config Repo loop -->
  <path d="M210 744 L600 744 L600 174 L510 174" fill="none" stroke="#aaa" stroke-width="0.8" stroke-dasharray="5 3" marker-end="url(#arrow)" opacity="0.4"/>
  <text font-size="10" fill="#bbb" x="614" y="460">revert tag</text>

  <!-- Legend -->
  <line x1="40" y1="800" x2="70" y2="800" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-size="11" fill="#666" x="76" y="804">active flow</text>
  <line x1="160" y1="800" x2="190" y2="800" fill="none" stroke="#555" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text font-size="11" fill="#666" x="196" y="804">conditional / watch</text>
</svg>
