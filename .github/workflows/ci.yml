name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  IMAGE_NAME: invoiceflow
  REGION: asia-south1

jobs:

  # ── Job 1: Unit Tests ──
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r app/requirements.txt pytest pytest-cov httpx

      - name: Run tests with coverage
        run: pytest tests/test_main.py -v --cov=app --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ── Job 1b: Selenium E2E Tests ──
  selenium:
    name: Selenium E2E Tests
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Modern Chrome install (no apt-key)
      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -qO- https://dl.google.com/linux/linux_signing_key.pub | gpg --dearmor > google.gpg
          sudo install -o root -g root -m 644 google.gpg /usr/share/keyrings/
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r app/requirements.txt pytest selenium webdriver-manager aiofiles

      - name: Run Selenium tests
        run: pytest tests/test_selenium.py -v

  # ── Job 2: SonarQube Code Quality ──
  sonarcloud:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: [test, selenium]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ── Job 3: Trivy Security Scan ──
  trivy:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t invoiceflow:scan .

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: invoiceflow:scan
          format: table
          exit-code: "1"
          severity: CRITICAL

  # ── Job 4: Build & Push ──
  build-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: [sonarcloud, trivy]

    outputs:
      image_tag: ${{ steps.vars.outputs.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "sha=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build & Push
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/invoiceflow/api:${{ steps.vars.outputs.sha }} .
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/invoiceflow/api:${{ steps.vars.outputs.sha }}

  # ── Job 5: Update Config Repo ──
  update-config:
    name: Update Config Repo
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - uses: actions/checkout@v4
        with:
          repository: Subhitcha04/invoiceflow-config
          token: ${{ secrets.GH_PAT }}

      - name: Update manifest
        run: |
          sed -i "s|image:.*|image: ${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/invoiceflow/api:${{ needs.build-push.outputs.image_tag }}|" k8s/green/deployment.yaml

          git config user.email "ci@invoiceflow.com"
          git config user.name "CI Bot"
          git add k8s/green/deployment.yaml
          git commit -m "ci: update green image to ${{ needs.build-push.outputs.image_tag }}" || echo "No changes to commit"
          git push