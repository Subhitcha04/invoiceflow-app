<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>InvoiceFlow</title>
</head>
<body>
  <h1>InvoiceFlow — Invoice Upload</h1>
  <form id="uploadForm">
    <input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.pdf"/>
    <button type="submit" id="uploadBtn">Upload Invoice</button>
  </form>
  <div id="result"></div>

  <script>
    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const file = document.getElementById('fileInput').files[0];
      const formData = new FormData();
      formData.append('file', file);

      const res = await fetch('/invoice/upload', { method: 'POST', body: formData });
      const data = await res.json();
      document.getElementById('result').innerText = JSON.stringify(data, null, 2);
    });
  </script>
</body>
</html>
